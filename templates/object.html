<!DOCTYPE html>
<html>
<head>
    <title>Object Detection</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        canvas {
            z-index: 2;
        }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>


<button onclick="goToCompare()" style="
position:absolute;
top:20px;
right:20px;
z-index:3;
padding:10px 20px;
font-size:16px;">
Compare Models
</button>
<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* ========= VOICE ========= */

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}

/* ========= COLOR GENERATOR ========= */

function getColor(label) {
    const colors = {
        person: "red",
        bottle: "blue",
        chair: "green",
        laptop: "orange"
    };
    return colors[label] || "yellow";
}

/* ========= START CAMERA ========= */

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
    speak("Camera started. Detecting objects.");
    startDetection();
})
.catch(() => {
    speak("Camera access denied");
});

/* ========= DETECTION LOOP ========= */

let lastSpoken = "";

function startDetection() {
    setInterval(async () => {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        const blob = await new Promise(resolve =>
            canvas.toBlob(resolve, "image/jpeg")
        );

        const formData = new FormData();
        formData.append("image", blob, "frame.jpg");

        const res = await fetch("/detect", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw video frame again
        ctx.drawImage(video, 0, 0);

        let detectedNames = [];

        data.detections.forEach(det => {
            const [x1, y1, x2, y2] = det.box;
            const label = det.label;
            const conf = det.confidence;

            detectedNames.push(label);

            const color = getColor(label);

            // Draw box
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            // Draw label
            ctx.fillStyle = color;
            ctx.font = "18px Arial";
            ctx.fillText(`${label} (${conf})`, x1, y1 - 5);
        });

        // Remove duplicates
        detectedNames = [...new Set(detectedNames)];

        if (detectedNames.length > 0) {
            let sentence = "I see " + detectedNames.join(", ");

            if (sentence !== lastSpoken) {
                speak(sentence);
                lastSpoken = sentence;
            }
        }

    }, 2000); // slower = more stable
}

function goToCompare() {
    window.location.href = "/compare";
}
</script>

</body>
</html>
